apiVersion: v1
kind: Namespace
metadata:
  name: llm-gateway
  labels:
    app.kubernetes.io/managed-by: helm
    environment: production
    team: platform
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: llm-gateway-quota
  namespace: llm-gateway
spec:
  hard:
    requests.cpu: "4"
    requests.memory: 4Gi
    limits.cpu: "8"
    limits.memory: 8Gi
    pods: "20"
    services: "10"
    persistentvolumeclaims: "5"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: llm-gateway-limits
  namespace: llm-gateway
spec:
  limits:
    - type: Container
      default:
        cpu: 500m
        memory: 512Mi
      defaultRequest:
        cpu: 100m
        memory: 128Mi
      max:
        cpu: "2"
        memory: 2Gi
    - type: Pod
      max:
        cpu: "4"
        memory: 4Gi

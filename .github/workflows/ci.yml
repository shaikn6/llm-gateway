name: CI
on:
  push:
    branches: [main]
  pull_request:
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - run: pip install ruff && ruff check src/ tests/
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - run: pip install pytest pytest-cov pytest-asyncio pytest-mock anthropic openai fastapi uvicorn redis httpx pydantic pydantic-settings
      - run: pytest tests/ -v --cov=src --cov-report=xml --cov-fail-under=95
        # Tests use mocked responses — no real API key needed
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - run: pip install bandit && bandit -r src/ -ll || true
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build --target production -t llm-gateway:ci .

{{- if .Values.externalSecrets.enabled }}
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "llm-gateway.fullname" . }}-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "llm-gateway.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.externalSecrets.secretStoreRef.name }}
    kind: {{ .Values.externalSecrets.secretStoreRef.kind }}
  target:
    name: {{ include "llm-gateway.fullname" . }}-secrets
    creationPolicy: Owner
    template:
      type: Opaque
  data:
    - secretKey: openai-api-key
      remoteRef:
        key: {{ .Values.externalSecrets.remoteRefs.openaiApiKey }}
    - secretKey: anthropic-api-key
      remoteRef:
        key: {{ .Values.externalSecrets.remoteRefs.anthropicApiKey }}
    - secretKey: ollama-host
      remoteRef:
        key: {{ .Values.externalSecrets.remoteRefs.ollamaHost }}
{{- else }}
---
# Fallback Secret — populate with real values or use Vault/ESO in production
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "llm-gateway.fullname" . }}-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "llm-gateway.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
data:
  openai-api-key: ""
  anthropic-api-key: ""
  ollama-host: ""
{{- end }}
